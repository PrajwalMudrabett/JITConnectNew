<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JITConnect - Profile</title>
    <link rel="stylesheet" href="premium-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body class="light-mode">
    <div class="background-wrapper">
        <div class="overlay"></div>
    </div>

    <div class="dashboard-container">
        <aside class="sidebar glass-effect">
            <h1 class="sidebar-logo">JITConnect</h1>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item"><a href="dashboard.html" class="nav-link"><span>🏠</span> Home</a></li>
                    <li class="nav-item"><a href="explore.html" class="nav-link"><span>🔍</span> Explore</a></li>
                    <li class="nav-item"><a href="messages.html" class="nav-link"><span>💬</span> Messages</a></li>
                    <li class="nav-item"><a href="profile.html" class="nav-link active"><span>👤</span> My Profile</a></li>
                    <li class="nav-item"><a href="connections.html" class="nav-link"><span>🤝</span> Connections</a></li>
                    <li class="nav-item"><a href="#" class="nav-link" onclick="toggleTheme()"><span class="theme-icon-nav">🌙</span> Theme</a></li>
                    <li class="nav-item"><a href="#" class="nav-link" onclick="logout()"><span>🚪</span> Logout</a></li>
                </ul>
            </nav>
        </aside>

        <main class="feed" style="grid-column: span 2;">
            <div class="profile-header glass-effect" style="padding: 40px; margin-bottom: 24px; border-radius: 16px;">
                <div style="display: flex; align-items: center; gap: 24px;">
                    <div class="avatar" style="width: 100px; height: 100px; font-size: 40px;" id="profileAvatar"></div>
                    <div style="flex: 1;">
                        <h2 id="profileName" style="margin-bottom: 8px;"></h2>
                        <p id="profileRole" style="font-size: 16px; color: var(--text-secondary-light); margin-bottom: 4px;"></p>
                        <p id="profileDetails" style="font-size: 14px; color: var(--text-secondary-light);"></p>
                        <button class="btn-primary" style="width: auto; padding: 10px 24px; margin-top: 16px;" onclick="editProfile()">
                            Edit Profile
                        </button>
                    </div>
                </div>
            </div>

            <div class="glass-effect" style="padding: 24px; border-radius: 16px;">
                <h3 style="margin-bottom: 24px;">My Posts</h3>
                <div id="userPostsContainer"></div>
            </div>
        </main>
    </div>

    <script src="profile-script.js"></script>
</body>
</html>
