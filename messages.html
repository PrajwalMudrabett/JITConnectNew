<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JITConnect - Messages</title>
    <link rel="stylesheet" href="ferrari-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="page-messages">
    <div class="background-wrapper">
        <div class="overlay"></div>
    </div>

    <div class="dashboard-container">
        <aside class="sidebar">
            <img src="assets/jit-images/JIT-LOGO.png" alt="JIT Logo" class="sidebar-logo-img">
            <h1 class="sidebar-logo">JITCONNECT</h1>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item"><a href="dashboard.html" class="nav-link"><span>🏠</span> HOME</a></li>
                    <li class="nav-item"><a href="explore.html" class="nav-link"><span>🔍</span> EXPLORE</a></li>
                    <li class="nav-item"><a href="messages.html" class="nav-link active"><span>💬</span> MESSAGES</a></li>
                    <li class="nav-item"><a href="profile.html" class="nav-link"><span>👤</span> PROFILE</a></li>
                    <li class="nav-item"><a href="connections.html" class="nav-link"><span>🤝</span> CONNECTIONS</a></li>
                    <li class="nav-item"><a href="#" class="nav-link" onclick="logout()"><span>🚪</span> LOGOUT</a></li>
                </ul>
            </nav>
        </aside>

        <main class="feed" style="grid-column: span 2;">
            <div style="background: rgba(26, 26, 26, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(220, 0, 0, 0.2); padding: 30px; min-height: 600px; display: grid; grid-template-columns: 300px 1fr;">
                <div style="border-right: 1px solid rgba(220, 0, 0, 0.2); padding-right: 20px;">
                    <h3 style="margin-bottom: 20px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;">CONVERSATIONS</h3>
                    <div id="conversationsList"></div>
                </div>
                <div style="padding-left: 30px; display: flex; flex-direction: column;">
                    <div id="chatHeader" style="padding-bottom: 20px; border-bottom: 1px solid rgba(220, 0, 0, 0.2); margin-bottom: 20px;">
                        <h3 style="font-weight: 800; letter-spacing: 1px; text-transform: uppercase;">SELECT A CONVERSATION</h3>
                    </div>
                    <div id="messagesContainer" style="flex: 1; overflow-y: auto; margin-bottom: 16px;"></div>
                    <div style="display: flex; gap: 12px;">
                        <input type="text" id="messageInput" placeholder="Type a message..." 
                               style="flex: 1; padding: 12px 16px; border: 2px solid rgba(0,0,0,0.1); border-radius: 24px; font-size: 14px;">
                        <button class="btn-primary" style="width: auto; padding: 12px 24px; margin: 0; border-radius: 24px;" onclick="sendMessage()">
                            Send
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="messages-script.js"></script>
</body>
</html>
